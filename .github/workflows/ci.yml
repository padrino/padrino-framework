name: CI
on: [push]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ['2.7', '3.0', '3.1', '3.2', '3.3', '3.4', 'jruby', '4.0']
        haml_version: ['5', '7']
        exclude:
          - ruby: '4.0'
            haml_version: '5'
    runs-on: ${{ matrix.os }}
    env:
      HAML_VERSION: ${{ matrix.haml_version }}
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - run: bundle exec rake test
